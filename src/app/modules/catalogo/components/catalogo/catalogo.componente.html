<header class="header">
  <h1>Catálogo</h1>
  <a routerLink="/carrito" class="btn-carrito">
    🛒 Carrito
    @if (totalItemsCarrito > 0) {
      <span class="badge">{{ totalItemsCarrito }}</span>
    }
  </a>
</header>

@if (cargando()) {
  <div class="loading">Cargando productos...</div>
} @else if (productos().length === 0) {
  <div class="loading">No se encontraron productos</div>
} @else {
  <section class="grid">
    @for (p of productos(); track p.id) {
      <app-producto-card [producto]="p" (agregarAlCarrito)="onAgregarAlCarrito($event)"></app-producto-card>
    }
  </section>
}
