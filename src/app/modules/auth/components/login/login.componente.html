<div class="login-shell">
  <header class="logo-header">
    <div class="logo-container">
      <div class="logo-icon">◻</div>
      <div class="logo-text">
        <h1>Cy<span class="red">aco</span></h1>
        <p>Plataforma de Tecnología Industrial</p>
      </div>
    </div>
  </header>

  <main class="login-main">
    <div class="login-card">
      <h2>Iniciar Sesión</h2>
      <p class="login-desc">Accede a tu cuenta para gestionar cotizaciones y proyectos</p>

      <form (ngSubmit)="iniciarSesion()" class="login-form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            #inputEmail
            id="email"
            type="email"
            placeholder="tu@empresa.com"
            [value]="email()"
            (input)="actualizarEmail(inputEmail.value)"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-wrapper">
            <input
              #inputPassword
              id="password"
              [type]="mostrarPassword() ? 'text' : 'password'"
              placeholder="Tu contraseña"
              [value]="password()"
              (input)="actualizarPassword(inputPassword.value)"
              required
            />
            <button
              type="button"
              class="btn-toggle-password"
              (click)="toggleMostrarPassword()"
              title="Mostrar/ocultar contraseña"
            >
              {{ mostrarPassword() ? '🙈' : '👁' }}
            </button>
          </div>
        </div>

        <div class="form-footer">
          <label class="checkbox-label">
            <input
              type="checkbox"
              [checked]="recuerdate()"
              (change)="toggleRecuerdate()"
            />
            Recuérdarme
          </label>
          <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </div>

        @if (error()) {
          <div class="error-message">{{ error() }}</div>
        }

        <button type="submit" class="btn-login" [disabled]="cargando()">
          @if (cargando()) {
            <span>⏳ Iniciando sesión...</span>
          } @else {
            <span>→ Iniciar Sesión</span>
          }
        </button>
      </form>

      <p class="no-account">
        ¿No tienes cuenta?
        <a href="/auth/registro" class="link-register">Regístrate aquí</a>
      </p>
    </div>
  </main>

  <footer class="login-footer">
    <p>© 2025 Cyaco Tecnología Industrial</p>
  </footer>
</div>
