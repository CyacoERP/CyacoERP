services:
  postgres:
    image: postgres:16-alpine
    container_name: cyacoerp-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyacoerp}
      POSTGRES_USER: ${POSTGRES_USER:-cyaco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cyaco} -d ${POSTGRES_DB:-cyacoerp}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyacoerp-backend-prod
    restart: always
    env_file:
      - ./backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads

  frontend:
    image: nginx:alpine
    container_name: cyacoerp-frontend-prod
    restart: always
    depends_on:
      - backend
    ports:
      - '80:80'
    volumes:
      - ./frontend/dist/cyacoerp:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_prod_data:
  uploads_data: