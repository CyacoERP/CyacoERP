<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/" class="logo">
      <div class="logo-icon" aria-hidden="true">C</div>
      <div class="logo-text-group">
        <div class="logo-text">Cy<span class="logo-red">aco</span></div>
        <div class="logo-subtitle">Tecnología Industrial</div>
      </div>
    </a>

    <div class="nav-menu">
      <a routerLink="/catalogo" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Catálogo</a>

      <div class="nav-dropdown">
        <button class="nav-link nav-dropdown-trigger" [class.active]="estaEnSeccion(['/cotizaciones'])" type="button" aria-label="Abrir menú de cotizaciones">
          Cotizaciones
          <span class="nav-caret" aria-hidden="true">▾</span>
        </button>
        <div class="dropdown-menu">
          <a routerLink="/cotizaciones/mis" class="dropdown-item">Mis Cotizaciones</a>
          <a routerLink="/cotizaciones/solicitar" class="dropdown-item">Solicitar Cotización</a>
        </div>
      </div>

      <a routerLink="/proyectos" routerLinkActive="active" class="nav-link">Proyectos</a>

      <div class="nav-dropdown">
        <button class="nav-link nav-dropdown-trigger" [class.active]="estaEnSeccion(['/dashboards'])" type="button" aria-label="Abrir menú de dashboards">
          Dashboards
          <span class="nav-caret" aria-hidden="true">▾</span>
        </button>
        <div class="dropdown-menu">
          <a routerLink="/dashboards/ventas" class="dropdown-item">Ventas</a>
          <a routerLink="/dashboards/clientes" class="dropdown-item">Clientes</a>
          <a routerLink="/dashboards/proyectos" class="dropdown-item">Proyectos</a>
        </div>
      </div>

      @if (esAdmin()) {
        <div class="nav-dropdown">
          <button class="nav-link nav-dropdown-trigger" [class.active]="estaEnSeccion(['/admin'])" type="button" aria-label="Abrir menú de administración">
            Administración
            <span class="nav-caret" aria-hidden="true">▾</span>
          </button>
          <div class="dropdown-menu">
            <a routerLink="/admin/clientes" class="dropdown-item">Gestionar Clientes</a>
            <a routerLink="/admin/cotizaciones" class="dropdown-item">Gestionar Cotizaciones</a>
            <a routerLink="/admin/productos" class="dropdown-item">Gestionar Inventario</a>
          </div>
        </div>
      }

      <a routerLink="/blog" routerLinkActive="active" class="nav-link">Blog</a>
      <a routerLink="/contacto" routerLinkActive="active" class="nav-link">Contacto</a>
    </div>

    <div class="nav-actions">
      <button type="button" class="btn-cotizacion" (click)="abrirCarritoDrawer()" aria-label="Abrir cotización">
        Cotización
        @if (totalItemsCarrito() > 0) {
          <span class="quote-count" [attr.aria-label]="totalItemsCarrito() + ' productos en cotización'">{{ totalItemsCarrito() }}</span>
        }
      </button>

      @if (usuarioActual(); as usuario) {
        <div class="nav-dropdown nav-dropdown-user">
          <button type="button" class="btn-login nav-dropdown-trigger" aria-label="Abrir menú de cuenta">
            {{ usuario.nombre }}
            <span class="nav-caret" aria-hidden="true">▾</span>
          </button>
          <div class="dropdown-menu dropdown-menu-user">
            <a routerLink="/perfil" class="dropdown-item">Mi Perfil</a>
            <button type="button" class="dropdown-item" (click)="cerrarSesion()">Cerrar sesión</button>
          </div>
        </div>
      } @else {
        <a routerLink="/auth/login" class="btn-login" aria-label="Ir a inicio de sesión">
          Ingresar
        </a>
      }
    </div>
  </div>
</nav>
