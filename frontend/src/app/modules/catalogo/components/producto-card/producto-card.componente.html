<article class="card">
  <img [src]="imagenUrl" [alt]="producto.nombre" class="img" />
  <div class="body">
    <h3 class="title">{{ producto.nombre }}</h3>
    <p class="meta">{{ producto.categoria?.nombre || 'Sin categoría' }}</p>
    <p class="desc">{{ producto.descripcion }}</p>
    <span class="price">{{ precioFormateado }}</span>
    @if (producto.stock > 0) {
      <button class="btn-agregar" (click)="onAgregarAlCarrito()">Agregar al carrito</button>
    } @else {
      <span class="sin-stock">Sin stock</span>
    }
    <div class="doc-actions">
      @if (urlDocumento) {
        <button class="btn-doc" (click)="abrirDocumento()">📄 Ver ficha técnica</button>
      }
      @if (esAdmin) {
        <label class="btn-subir" [class.cargando]="subiendo()">
          @if (subiendo()) {
            Subiendo…
          } @else {
            📤 {{ urlDocumento ? 'Actualizar PDF' : 'Subir ficha PDF' }}
          }
          <input type="file" accept="application/pdf" (change)="onSeleccionarArchivo($event)" hidden />
        </label>
        @if (errorSubida()) {
          <p class="doc-error">{{ errorSubida() }}</p>
        }
      }
    </div>
  </div>
</article>
